<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <radialGradient id="bodyFill" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7dd95a"/>
      <stop offset="100%" stop-color="#4aaa2a"/>
    </radialGradient>
    <radialGradient id="bellyFill" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#c8f0a0"/>
      <stop offset="100%" stop-color="#9de068"/>
    </radialGradient>
    <radialGradient id="headFill" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8de060"/>
      <stop offset="100%" stop-color="#4aaa2a"/>
    </radialGradient>
  </defs>

  <!-- しっぽ -->
  <path d="M 148 120 Q 185 118 192 100 Q 196 86 180 88 Q 165 90 155 108" fill="url(#bodyFill)" stroke="#3A8C3F" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="104" cy="118" rx="54" ry="44" fill="url(#bodyFill)" stroke="#3A8C3F" stroke-width="3"/>

  <!-- お腹ハイライト -->
  <ellipse cx="100" cy="124" rx="32" ry="26" fill="url(#bellyFill)" opacity="0.7"/>

  <!-- 首 -->
  <path d="M 72 82 Q 60 60 68 30 Q 72 14 82 10 Q 94 6 98 20 Q 104 36 96 60 Q 90 76 82 88" fill="url(#headFill)" stroke="#3A8C3F" stroke-width="3" stroke-linejoin="round"/>
  <!-- 首ハイライト -->
  <path d="M 78 78 Q 68 60 74 34 Q 77 20 83 18" stroke="#a0e870" stroke-width="4" stroke-linecap="round" opacity="0.5" fill="none"/>

  <!-- 頭 -->
  <ellipse cx="88" cy="18" rx="26" ry="20" fill="url(#headFill)" stroke="#3A8C3F" stroke-width="3"/>
  <!-- 頭ハイライト -->
  <ellipse cx="80" cy="12" rx="10" ry="6" fill="#b0f070" opacity="0.4"/>

  <!-- 鼻先 -->
  <ellipse cx="108" cy="22" rx="10" ry="7" fill="#6ac840" stroke="#3A8C3F" stroke-width="2"/>
  <!-- 鼻の穴 -->
  <circle cx="112" cy="20" r="2" fill="#3A8C3F"/>

  <!-- 口（やさしい笑顔） -->
  <path d="M 100 28 Q 106 34 112 28" stroke="#3A8C3F" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- 目（大きくてくりくり） -->
  <circle cx="80" cy="14" r="10" fill="#ffffff" stroke="#3A8C3F" stroke-width="2"/>
  <circle cx="80" cy="14" r="6" fill="#3a9a20"/>
  <circle cx="80" cy="14" r="3" fill="#1a5010"/>
  <!-- 目のハイライト -->
  <circle cx="77" cy="11" r="2.5" fill="#ffffff"/>
  <circle cx="83" cy="16" r="1.2" fill="#ffffff" opacity="0.6"/>

  <!-- まつ毛（かわいく） -->
  <path d="M 74 7 L 72 4" stroke="#3A8C3F" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 79 5 L 79 2" stroke="#3A8C3F" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 84 7 L 86 4" stroke="#3A8C3F" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 前足（左） -->
  <path d="M 72 138 Q 66 150 60 158 Q 56 164 62 165 Q 70 166 74 158 L 78 148" fill="url(#bodyFill)" stroke="#3A8C3F" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 前足（右） -->
  <path d="M 92 142 Q 90 154 88 162 Q 86 168 92 168 Q 100 168 100 160 L 100 150" fill="url(#bodyFill)" stroke="#3A8C3F" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 後足（左） -->
  <path d="M 120 144 Q 116 156 112 163 Q 108 170 115 170 Q 124 170 126 162 L 128 152" fill="url(#bodyFill)" stroke="#3A8C3F" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 後足（右） -->
  <path d="M 138 138 Q 138 152 136 160 Q 134 168 140 168 Q 150 168 150 160 L 148 148" fill="url(#bodyFill)" stroke="#3A8C3F" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 背中の突起（スパイク） -->
  <path d="M 90 76 L 85 65 L 92 74" fill="#5bbf30" stroke="#3A8C3F" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 104 72 L 100 60 L 107 70" fill="#5bbf30" stroke="#3A8C3F" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M 118 76 L 116 63 L 122 74" fill="#5bbf30" stroke="#3A8C3F" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
