<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0e8ff"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8e0ff"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- アンテナ棒 -->
  <rect x="57" y="4" width="6" height="22" rx="3" fill="#4a90e2"/>
  <!-- アンテナ球（ゴールド、光る） -->
  <circle cx="60" cy="4" r="8" fill="#FFD700" filter="url(#glow)"/>
  <circle cx="57" cy="2" r="2.5" fill="#fff" opacity="0.7"/>

  <!-- 頭 -->
  <rect x="18" y="22" width="84" height="68" rx="28" fill="url(#headGrad)" stroke="#4a90e2" stroke-width="3.5"/>
  <!-- 頭の光沢ハイライト -->
  <ellipse cx="45" cy="32" rx="18" ry="8" fill="#ffffff" opacity="0.35"/>

  <!-- 顔スクリーン（青い角丸四角） -->
  <rect x="26" y="32" width="68" height="46" rx="16" fill="#4a90e2"/>
  <!-- スクリーン内側の光沢 -->
  <rect x="29" y="35" width="62" height="18" rx="10" fill="#6aaaf0" opacity="0.4"/>

  <!-- 左目 -->
  <circle cx="44" cy="53" r="13" fill="#ffffff"/>
  <circle cx="44" cy="53" r="8" fill="#00bcd4"/>
  <circle cx="44" cy="53" r="4" fill="#006080"/>
  <circle cx="40" cy="49" r="2.5" fill="#ffffff"/>

  <!-- 右目 -->
  <circle cx="76" cy="53" r="13" fill="#ffffff"/>
  <circle cx="76" cy="53" r="8" fill="#00bcd4"/>
  <circle cx="76" cy="53" r="4" fill="#006080"/>
  <circle cx="72" cy="49" r="2.5" fill="#ffffff"/>

  <!-- 口（やさしいアーチ） -->
  <path d="M 46 70 Q 60 80 74 70" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- 胴体 -->
  <rect x="22" y="88" width="76" height="56" rx="20" fill="url(#bodyGrad)" stroke="#4a90e2" stroke-width="3.5"/>
  <!-- 胴体の青いパネル -->
  <rect x="34" y="98" width="52" height="32" rx="10" fill="#4a90e2" opacity="0.18"/>
  <!-- 胴体のボタン（3つ） -->
  <circle cx="50" cy="110" r="5" fill="#4a90e2"/>
  <circle cx="60" cy="110" r="5" fill="#4a90e2"/>
  <circle cx="70" cy="110" r="5" fill="#4a90e2"/>
  <!-- 胴体ハイライト -->
  <ellipse cx="44" cy="96" rx="14" ry="6" fill="#ffffff" opacity="0.3"/>

  <!-- 左腕 -->
  <rect x="2" y="94" width="22" height="36" rx="11" fill="url(#bodyGrad)" stroke="#4a90e2" stroke-width="3"/>
  <circle cx="13" cy="133" r="7" fill="#d0e8ff" stroke="#4a90e2" stroke-width="2.5"/>

  <!-- 右腕 -->
  <rect x="96" y="94" width="22" height="36" rx="11" fill="url(#bodyGrad)" stroke="#4a90e2" stroke-width="3"/>
  <circle cx="107" cy="133" r="7" fill="#d0e8ff" stroke="#4a90e2" stroke-width="2.5"/>
</svg>
